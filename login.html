<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>AutoServiceHub</title>

  </head>
  <body>
    <main class="py-5">
  <div class="container container-narrow">
    <div class="row justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="card p-4">
          <h1 class="h4 mb-3">Вход</h1>
          <form id="formLogin" class="vstack gap-3">
            <div>
              <label class="form-label">Имейл</label>
              <input id="email" type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div>
              <label class="form-label">Парола</label>
              <input id="password" type="password" class="form-control" required>
            </div>
            <button class="btn btn-dark w-100" type="submit">Вход</button>
            <div class="text-secondary small">
              Нямаш акаунт? <a href="/register.html">Регистрация</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="/src/pages/login.js"></script>
  </body>
</html>
