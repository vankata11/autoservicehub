<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>AutoServiceHub</title>

  </head>
  <body>
    <main class="py-5">
  <div class="container container-narrow">
    <div class="row justify-content-center">
      <div class="col-lg-9">
        <div class="card p-4 p-lg-5">
          <h1 class="h4 mb-3">Нова сервизна заявка</h1>
          <form id="formCreate" class="vstack gap-3">
            <div>
              <label class="form-label">Заглавие</label>
              <input id="title" class="form-control" placeholder="Напр. шум при завиване" required>
            </div>
            <div>
              <label class="form-label">Автомобил</label>
              <input id="car" class="form-control" placeholder="Напр. VW Golf 6 1.6 BiFuel 2009" required>
            </div>
            <div>
              <label class="form-label">Описание</label>
              <textarea id="description" class="form-control" rows="5" placeholder="Опиши симптомите, кога се появява, какво вече е правено..." required></textarea>
            </div>
            <div>
              <label class="form-label">Файлове (до 5)</label>
              <input id="files" type="file" class="form-control" multiple accept="image/*,application/pdf">
              <div class="form-text text-secondary">Пример: снимки, фактури, диагностични скрийншоти.</div>
            </div>
            <button class="btn btn-dark" type="submit">Създай</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="/src/pages/create-request.js"></script>
  </body>
</html>
