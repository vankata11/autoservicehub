<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>AutoServiceHub</title>

  </head>
  <body>
    <main class="py-5">
  <div class="container container-narrow">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2 mb-3">
      <div>
        <h1 id="title" class="h4 mb-1"></h1>
        <div class="text-secondary small">Създадена: <span id="created"></span></div>
      </div>
      <a class="btn btn-outline-dark" href="/dashboard.html">Назад</a>
    </div>

    <div class="row g-3">
      <div class="col-lg-7">
        <div class="card p-4">
          <div class="d-flex justify-content-between align-items-center mb-3">
            <h2 class="h6 mb-0">Детайли</h2>
            <div id="status"></div>
          </div>
          <div class="mb-2"><span class="text-secondary small">Автомобил:</span> <span id="car" class="fw-semibold"></span></div>
          <div class="text-secondary small mb-1">Описание:</div>
          <div id="desc" class="bg-light rounded-3 p-3"></div>
        </div>
      </div>
      <div class="col-lg-5">
        <div class="card p-4">
          <h2 class="h6 mb-3">Файлове</h2>
          <ul id="files" class="list-group list-group-flush"></ul>
        </div>
      </div>
    </div>
  </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="/src/pages/request.js"></script>
  </body>
</html>
