<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>AutoServiceHub</title>
  </head>
  <body>
    <main class="py-5">
      <div class="container container-narrow">
        <div class="mb-3">
          <h1 class="h4 mb-1">Админ панел</h1>
          <div class="text-secondary small">Управление на всички сервизни заявки.</div>
        </div>

        <!-- Search input -->
        <div class="mb-3">
          <input
            type="text"
            id="searchInput"
            class="form-control"
            placeholder="Търси по заглавие или клиент..."
          >
        </div>

        <div class="card p-3 p-lg-4">
          <div class="table-responsive">
            <table id="tbl" class="table align-middle mb-0">
              <thead>
                <tr>
                  <th class="text-secondary small">Създадена</th>
                  <th>Заглавие</th>
                  <th class="text-secondary small">Потребител</th>
                  <th>Статус</th>
                  <th></th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/src/pages/admin.js"></script>
  </body>
</html>
