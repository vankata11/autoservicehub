<!doctype html>
<html lang="bg">
  <head>
    <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<title>AutoServiceHub</title>

  </head>
  <body>
    <main class="py-5">
  <div class="container container-narrow">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-6">
        <div class="card p-4">
          <h1 class="h4 mb-3">Регистрация</h1>
          <form id="formRegister" class="vstack gap-3">
            <div>
              <label class="form-label">Име и фамилия</label>
              <input id="fullName" type="text" class="form-control" placeholder="Иван Гамалов" required>
            </div>
            <div>
              <label class="form-label">Имейл</label>
              <input id="email" type="email" class="form-control" placeholder="name@example.com" required>
            </div>
            <div class="row g-2">
              <div class="col-md-6">
                <label class="form-label">Парола</label>
                <input id="password" type="password" class="form-control" minlength="6" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">Повтори парола</label>
                <input id="password2" type="password" class="form-control" minlength="6" required>
              </div>
            </div>
            <button class="btn btn-dark w-100" type="submit">Създай акаунт</button>
            <div class="text-secondary small">
              Имаш акаунт? <a href="/login.html">Вход</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module" src="/src/pages/register.js"></script>
  </body>
</html>
